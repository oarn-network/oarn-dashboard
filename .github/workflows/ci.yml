name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Stub values for CI — real values live in Vercel environment variables.
          # All NEXT_PUBLIC_* vars that lack a ?? default in constants.ts must be listed here.
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci_stub
